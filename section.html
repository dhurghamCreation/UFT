<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFT | Section Explorer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#ff5100;--primary-light:#ff7333;--primary-dark:#cc4100;--secondary:#002d5a;--secondary-light:#004080;--accent:#00f2ff;--text:#1e293b;--text-muted:#64748b;--text-dim:#94a3b8;--dark:#0f172a;--success:#10b981;--gold:#fbbf24;--bg:#f8fafc;--white:#ffffff;--border:#e2e8f0;--hover:#fff7ed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;scroll-behavior:smooth}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--secondary)}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--primary-light)}
::selection{background:var(--primary);color:white}

.top-bar{background:var(--primary);padding:8px 6%;text-align:center;color:white;font-size:0.75rem;font-weight:700;letter-spacing:2px}
header{background:var(--white);border-bottom:4px solid var(--primary);padding:0 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:4000;box-shadow:0 4px 20px rgba(0,0,0,0.08);height:64px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(255,81,0,0.3)}
.brand-icon i{color:white;font-size:1.1rem}
.brand-text div:first-child{font-weight:900;font-size:1.2rem;color:var(--secondary);letter-spacing:-0.5px;line-height:1.2}
.brand-text div:first-child span{color:var(--primary)}
.brand-text div:last-child{font-size:0.5rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.header-actions{display:flex;gap:8px;align-items:center}
.lang-switch{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:6px 10px}
.lang-switch i{color:var(--primary)}
.lang-switch select{border:none;background:transparent;color:var(--secondary);font-weight:700;outline:none;font-family:inherit;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 22px;border-radius:10px;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.3s ease;border:none;text-decoration:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 15px rgba(255,81,0,0.2)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(255,81,0,0.35)}
.btn-soft{background:var(--bg);color:var(--secondary);border:1px solid var(--border)}
.btn-soft:hover{background:var(--hover);border-color:var(--primary)}

.hero{background:linear-gradient(135deg,var(--secondary),#001a33);min-height:50vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:60px 6%}
.hero::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1600') center/cover;opacity:0.08}
.hero-content{position:relative;z-index:2;width:min(1100px,92%);text-align:center;color:white}
.badge{display:inline-block;background:rgba(255,81,0,0.2);border:1px solid rgba(255,255,255,0.2);padding:6px 20px;border-radius:50px;font-size:0.7rem;font-weight:700;letter-spacing:2px;margin-bottom:20px;color:var(--accent)}
.hero h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:900;margin-bottom:15px;background:linear-gradient(135deg,#fff,var(--accent));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{max-width:800px;margin:0 auto 30px;color:rgba(255,255,255,0.85);font-size:1.05rem;line-height:1.8}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.hero-actions .btn{color:white}

.section{padding:60px 6%}
.shell{max-width:1200px;margin:0 auto}
.section-head{margin-bottom:30px}
.section-head h2{font-size:2rem;color:var(--secondary);font-weight:900;position:relative;display:inline-block}
.section-head h2::after{content:'';display:block;width:70px;height:4px;background:var(--primary);border-radius:2px;margin-top:10px}
.section-head p{color:var(--text-muted);max-width:700px;line-height:1.7;margin-top:10px}

.grid{display:grid;gap:22px}
.stats-row{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:30px}
.stat-card{background:var(--white);padding:24px;border-radius:14px;text-align:center;border-bottom:4px solid var(--primary);box-shadow:0 4px 15px rgba(0,0,0,0.03);transition:0.3s}
.stat-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(255,81,0,0.1)}
.stat-value{font-size:2rem;font-weight:900;color:var(--secondary);margin-bottom:6px}
.stat-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600}

.card{background:var(--white);border-radius:16px;padding:24px;border:1px solid var(--border);box-shadow:0 4px 15px rgba(0,0,0,0.03);transition:all 0.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,0.08)}

.two-col{display:grid;grid-template-columns:1.2fr 0.8fr;gap:24px;align-items:start}
.panel{background:var(--white);border-radius:16px;padding:24px;border:1px solid var(--border);border-top:4px solid var(--primary)}
.panel h3{font-size:1.15rem;color:var(--secondary);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.panel p,.panel li{line-height:1.7;color:var(--text-muted);font-size:0.9rem}
.list{list-style:none;display:grid;gap:10px}
.list li{display:flex;gap:10px;align-items:flex-start}
.list i{color:var(--success);margin-top:4px}

.info-grid{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.info-card{border-top:4px solid var(--primary);padding:24px}
.info-card i{font-size:1.8rem;color:var(--primary);margin-bottom:12px}
.info-card h4{font-size:1.05rem;color:var(--secondary);margin-bottom:8px}
.info-card p{color:var(--text-muted);line-height:1.7;font-size:0.9rem}

.table-wrap{overflow:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top;font-size:0.9rem}
th{background:var(--secondary);color:white;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase}
tr:hover td{background:var(--bg)}

.callout{background:linear-gradient(135deg,var(--secondary),#001a33);border-radius:20px;padding:36px;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;color:white}
.callout h3{font-size:1.4rem;margin-bottom:8px;color:white}
.callout p{max-width:640px;color:rgba(255,255,255,0.85);line-height:1.7;font-size:0.95rem}
.callout .btns{display:flex;gap:10px;flex-wrap:wrap}
.callout .btn{color:white}

footer{background:var(--dark);color:white;padding:40px 6% 20px;text-align:center;margin-top:60px}
footer p{color:var(--text-dim);font-size:0.85rem}

@media (max-width:900px){
.two-col{grid-template-columns:1fr}
.hero{min-height:40vh;padding:40px 5%}
.section{padding:40px 5%}
}
@media (max-width:640px){
header{padding:0 15px;height:auto;flex-wrap:wrap;padding:8px 12px}
.brand-text div:first-child{font-size:1rem}
.hero h1{font-size:2rem}
}
</style>
</head>

    const root = document.getElementById('sectionRoot');
    const introHtml = section.intro.map(p => `<p>${p}</p>`).join('');

                <div class="two-col">
                    <div class="panel">
                        <h3><i class="fas fa-info-circle" style="color:var(--primary)"></i> About This Route</h3>
                        ${introHtml}
                    </div>
                    <div class="panel">
                        <h3><i class="fas fa-link" style="color:var(--primary)"></i> Quick links</h3>
                        <ul class="list">
                            <li><i class="fas fa-circle-info"></i><span><a href="application.html">Open the application workspace</a></span></li>
                            <li><i class="fas fa-credit-card"></i><span><a href="${section.payment}">Open the payment portal</a></span></li>
                            <li><i class="fas fa-file-pdf"></i><span><a href="${section.brochure}" target="_blank" rel="noopener">View the brochure PDF</a></span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
        <section class="section" style="padding-top:0;">
            <div class="shell">
                <div class="grid info-grid">${cardsHtml}</div>
            </div>
        </section>
        <section class="section" style="padding-top:0;">
            <div class="shell">
                <div class="section-head"><h2>Tables and pathways</h2><p>Each section page uses tables so the content reads like a real university prospectus.</p></div>
                <div class="grid" style="gap:24px">${tablesHtml}</div>
            </div>
        </section>
        <section class="section" style="padding-top:0;">
            <div class="shell">
                <div class="callout">
                    <div>
                        <h3>Ready for the next step?</h3>
                        <p>${section.cta}</p>
                    </div>
                    <div class="btns">
                        <a class="btn btn-primary" href="application.html"><i class="fas fa-file-signature"></i> Apply now</a>
                        <a class="btn btn-soft" href="${section.payment}"><i class="fas fa-credit-card"></i> Payment portal</a>
                    </div>
                </div>
            </div>
        </section>`;
    applyLanguage(languageSelect ? languageSelect.value : 'en');
}

function applyLanguage(lang) {
    const pack = languagePacks[lang] || languagePacks.en;
    if (versionEl) versionEl.textContent = siteVersion;
    ['backHomeLabel','applyLabel'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = pack[id === 'backHomeLabel' ? 'backHome' : 'apply'];
    });
    document.documentElement.lang = lang;
    localStorage.setItem('uftLanguage', lang);
}

if (languageSelect) {
    const stored = localStorage.getItem('uftLanguage') || 'en';
    languageSelect.value = stored;
    languageSelect.addEventListener('change', e => applyLanguage(e.target.value));
}
if (versionEl) versionEl.textContent = siteVersion;
renderPage();
</script>
</body>
</html>
